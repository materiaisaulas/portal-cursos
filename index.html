<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Algoritmos e Programação</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Material didático de Algoritmos e Programação">

  <!-- Tema Docsify -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">

  <!-- CSS do projeto -->
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/typography.css">
  <link rel="stylesheet" href="assets/css/code.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/blocks.css">
  <link rel="stylesheet" href="assets/css/exercises.css">

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

  <!-- Fonte para código -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono/index.css">

</head>

<body>

  <!-- Barra superior -->
  <div class="topbar">
    <div class="logo">
      Algoritmos e programação
    </div>

    <div class="icons">
      <span>✉️</span>
      <span>👤</span>
      <span>🎤</span>
    </div>
  </div>

  <!-- Área onde o Docsify renderiza -->
  <div id="app"></div>


  <!-- CONFIGURAÇÃO DO DOCSIFY (SEMPRE ANTES DO DOCSIFY) -->
  <script>
    window.$docsify = {
      name: '',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 0,
      auto2top: true,
      relativePath: true,

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Pesquisar no material',
        noData: 'Nenhum resultado encontrado',
        depth: 3
      },

      plugins: [
        function (hook) {
          hook.doneEach(function () {
            if (window.renderMathInElement) {
              renderMathInElement(document.body, {
                delimiters: [
                  { left: "$$", right: "$$", display: true },
                  { left: "$", right: "$", display: false }
                ]
              });
            }
          });
        }
      ]
    };
  </script>


  <!-- DOCSIFY -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>

  <script>

    function saveSidebarState() {
      const openItems = [];
      document.querySelectorAll('.sidebar-nav li.open').forEach(function (li) {
        const link = li.querySelector('a');
        if (link) {
          openItems.push(link.getAttribute('href'));
        }
      });
      localStorage.setItem('sidebar-open', JSON.stringify(openItems));
    }


    function restoreSidebarState() {
      const saved = JSON.parse(localStorage.getItem('sidebar-open') || "[]");
      document.querySelectorAll('.sidebar-nav li').forEach(function (li) {
        const link = li.querySelector('a');
        if (link && saved.includes(link.getAttribute('href'))) {
          li.classList.add('open');
        }
      });
    }


    function enableToggle() {
      document.querySelectorAll('.sidebar-nav li').forEach(function (li) {
        const sub = li.querySelector(':scope > ul');
        if (sub) {
          const link = li.querySelector(':scope > p, :scope > a');
          link.addEventListener('click', function (e) {
            if (sub) {
              e.preventDefault();
            }
            li.classList.toggle('open');
            saveSidebarState();
          });
        }
      });
    }

    window.$docsify.plugins = [].concat(window.$docsify.plugins || [], function (hook) {
      hook.doneEach(function () {
        setTimeout(function () {
          restoreSidebarState();
          enableToggle();
        }, 100);
      });
    });

  </script>


  <!-- PLUGINS DOCSIFY -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>


  <!-- EXTENSÕES -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-python.min.js"></script>

  <!-- KaTeX -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>


  <!-- SCRIPTS DO PROJETO -->
  <script src="assets/js/engine.js"></script>
  <script src="assets/js/counters.js"></script>
  <script src="assets/js/compiler.js"></script>

  <script src="assets/js/components/imgtext.js"></script>
  <script src="assets/js/components/boxes.js"></script>
  <script src="assets/js/components/blocks.js"></script>
  <script src="assets/js/components/exercises.js"></script>

  <script src="assets/js/plugin.js"></script>

</body>

</html>
